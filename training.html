<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Smart Slots — Rep Training</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a1a2e;--navy2:#222840;--navy3:#2a3350;
  --blue:#1455a4;--blue2:#1a6fd4;--accent:#4ade80;
  --orange:#f39c12;--red:#e74c3c;--green:#4ade80;
  --purple:#a78bfa;
  --white:#fff;--gray:#8892a4;--border:#2a3348;
  --card:#1e2640;--card2:#242c44;--text:#e2e8f0;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 10% 20%,rgba(20,85,164,.15) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 85% 70%,rgba(74,222,128,.06) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:10;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;width:360px;text-align:center;}
.login-logo{font-size:22px;font-weight:800;color:var(--white);margin-bottom:4px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:13px;color:var(--gray);margin-bottom:1.5rem;line-height:1.6;}
.login-box input{width:100%;padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:10px;font-family:inherit;outline:none;color:var(--white);}
.login-box input:focus{border-color:var(--blue2);}
.login-btn{width:100%;padding:11px;background:var(--accent);color:var(--navy);border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;}
.login-btn:hover{opacity:.88;}
.login-error{color:var(--red);font-size:13px;margin-top:8px;display:none;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;}
.topbar{background:rgba(26,26,46,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-logo{font-size:15px;font-weight:800;color:var(--white);}
.topbar-logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.rep-badge{background:rgba(255,255,255,.1);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;color:var(--white);}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.2);color:var(--gray);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit;}
.logout-btn:hover{color:var(--white);}

/* LAYOUT */
.app-body{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 56px);}
@media(max-width:768px){.app-body{grid-template-columns:1fr;}}

/* SIDEBAR */
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:1.25rem 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.sidebar-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);padding:0 1.25rem;margin-bottom:.75rem;}
.module-item{display:flex;align-items:center;gap:10px;padding:.7rem 1.25rem;cursor:pointer;transition:background .15s;border-left:3px solid transparent;}
.module-item:hover{background:var(--card2);}
.module-item.active{background:var(--navy3);border-left-color:var(--accent);}
.module-item.completed{border-left-color:var(--green);}
.module-item.locked{opacity:.45;cursor:not-allowed;}
.mod-num{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gray);flex-shrink:0;}
.module-item.active .mod-num{background:var(--accent);color:var(--navy);}
.module-item.completed .mod-num{background:var(--green);color:var(--navy);}
.mod-info{flex:1;min-width:0;}
.mod-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mod-status{font-size:10px;color:var(--gray);margin-top:1px;}
.module-item.completed .mod-status{color:var(--green);}
.mod-score{font-size:11px;font-weight:700;color:var(--accent);}
.sidebar-progress{padding:1rem 1.25rem;border-top:1px solid var(--border);margin-top:.5rem;}
.prog-label{font-size:11px;color:var(--gray);margin-bottom:6px;display:flex;justify-content:space-between;}
.prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s;}

/* MAIN CONTENT */
.main{padding:2rem 2.5rem 5rem;max-width:760px;}
@media(max-width:768px){.main{padding:1.25rem 1rem 4rem;}}

/* MODULE HEADER */
.module-header{margin-bottom:2rem;}
.mod-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:.5rem;}
.mod-h1{font-size:26px;font-weight:800;color:var(--white);margin-bottom:.5rem;line-height:1.2;}
.mod-sub{font-size:14px;color:var(--gray);line-height:1.7;}
.mod-time{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray);margin-top:.75rem;}
.time-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}

/* CONTENT BLOCKS */
.content-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;}
.block-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:.75rem;display:flex;align-items:center;gap:8px;}
.block-body{font-size:14px;color:var(--gray);line-height:1.8;}
.block-body p{margin-bottom:.75rem;}
.block-body p:last-child{margin-bottom:0;}
.block-body strong{color:var(--text);}
.block-body ul{padding-left:1.25rem;margin-bottom:.75rem;}
.block-body ul li{margin-bottom:.4rem;}
.block-body .highlight{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:8px;padding:.85rem 1rem;margin:.75rem 0;color:var(--text);}
.block-body .warning{background:rgba(243,156,18,.08);border:1px solid rgba(243,156,18,.2);border-radius:8px;padding:.85rem 1rem;margin:.75rem 0;color:var(--text);}
.block-body .script-box{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:1rem 1.25rem;font-size:13px;line-height:1.8;color:var(--text);white-space:pre-line;margin:.75rem 0;}
.block-body .tip{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:4px;}

/* PLAN TABLE */
.plan-table{width:100%;border-collapse:collapse;font-size:13px;margin:.75rem 0;}
.plan-table th{background:var(--navy2);color:var(--gray);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:8px 12px;text-align:left;}
.plan-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);}
.plan-table tr:last-child td{border-bottom:none;}
.plan-table tr:hover td{background:rgba(255,255,255,.02);}

/* QUIZ */
.quiz-section{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-top:1.5rem;}
.quiz-title{font-size:14px;font-weight:700;color:var(--white);margin-bottom:.25rem;}
.quiz-sub{font-size:12px;color:var(--gray);margin-bottom:1.25rem;}
.quiz-q{margin-bottom:1.25rem;}
.quiz-q-text{font-size:14px;font-weight:600;color:var(--white);margin-bottom:.75rem;line-height:1.5;}
.quiz-options{display:flex;flex-direction:column;gap:8px;}
.quiz-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--text);line-height:1.5;}
.quiz-opt:hover{border-color:var(--blue2);}
.quiz-opt.selected{background:rgba(20,85,164,.2);border-color:var(--blue2);}
.quiz-opt.correct{background:rgba(74,222,128,.12);border-color:var(--green);color:var(--green);}
.quiz-opt.wrong{background:rgba(231,76,60,.1);border-color:var(--red);color:var(--red);}
.quiz-opt input{flex-shrink:0;margin-top:2px;accent-color:var(--accent);}
.quiz-submit{background:var(--accent);color:var(--navy);border:none;border-radius:8px;padding:11px 28px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:1rem;}
.quiz-submit:disabled{opacity:.4;cursor:not-allowed;}
.quiz-result{margin-top:1rem;padding:1rem 1.25rem;border-radius:8px;font-size:14px;font-weight:600;display:none;}
.quiz-result.pass{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:var(--green);}
.quiz-result.fail{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.2);color:var(--red);}
.quiz-result p{font-size:13px;font-weight:400;color:var(--gray);margin-top:4px;line-height:1.6;}
.retry-btn{background:transparent;border:1px solid var(--border);color:var(--gray);border-radius:8px;padding:8px 18px;font-size:12px;cursor:pointer;font-family:inherit;margin-top:8px;}
.retry-btn:hover{border-color:var(--accent);color:var(--accent);}

/* NEXT BUTTON */
.next-btn{background:var(--accent);color:var(--navy);border:none;border-radius:10px;padding:13px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:1.5rem;display:none;}
.next-btn:hover{opacity:.88;}
.complete-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.3);color:var(--green);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;margin-top:1.5rem;}

/* ADMIN VIEW */
#admin-panel{display:none;}
.admin-header{margin-bottom:1.5rem;}
.admin-header h2{font-size:20px;font-weight:700;color:var(--white);}
.admin-header p{font-size:13px;color:var(--gray);margin-top:4px;}
.rep-progress-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:12px;}
.rpc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.rpc-name{font-size:15px;font-weight:700;color:var(--white);}
.rpc-overall{font-size:13px;font-weight:700;color:var(--accent);}
.rpc-modules{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
@media(max-width:600px){.rpc-modules{grid-template-columns:repeat(4,1fr);}}
.rpc-mod{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:.6rem;text-align:center;}
.rpc-mod.done{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.25);}
.rpc-mod.failed{background:rgba(231,76,60,.08);border-color:rgba(231,76,60,.2);}
.rpc-mod-num{font-size:10px;font-weight:700;color:var(--gray);margin-bottom:3px;}
.rpc-mod-score{font-size:13px;font-weight:800;color:var(--text);}
.rpc-mod.done .rpc-mod-score{color:var(--green);}
.rpc-mod.failed .rpc-mod-score{color:var(--red);}
.rpc-mod-time{font-size:9px;color:var(--gray);margin-top:1px;}
.rpc-stats{display:flex;gap:12px;margin-top:.75rem;flex-wrap:wrap;}
.rpc-stat{font-size:12px;color:var(--gray);}
.rpc-stat strong{color:var(--text);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);color:var(--white);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

.empty{text-align:center;padding:3rem;color:var(--gray);font-size:14px;}
</style>
</head>
<body>
<div id="toast-el" class="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">My Smart<span>Slots</span></div>
    <div class="login-sub">Rep Training Portal<br/>Use your same portal username and password.</div>
    <input type="text" id="username" placeholder="Username" autocomplete="off"/>
    <input type="password" id="password" placeholder="Password"/>
    <button class="login-btn" onclick="doLogin()">Start Training</button>
    <p class="login-error" id="login-error">Incorrect username or password.</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">My Smart<span>Slots</span> — Rep Training</div>
    <div class="topbar-right">
      <span class="rep-badge" id="rep-name-display"></span>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="app-body">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-title">Training Modules</div>
      <div id="module-nav"></div>
      <div class="sidebar-progress">
        <div class="prog-label"><span>Overall Progress</span><span id="prog-pct">0%</span></div>
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div id="admin-nav-btn" style="display:none;padding:.75rem 1.25rem;border-top:1px solid var(--border);margin-top:.25rem;">
        <div class="module-item" style="padding:.5rem 0;border:none;" onclick="showAdminPanel()">
          <div class="mod-num" style="background:rgba(243,156,18,.15);color:var(--orange);">🔐</div>
          <div class="mod-info"><div class="mod-title" style="color:var(--orange);">Admin View</div><div class="mod-status">Rep progress tracker</div></div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main" id="main-content"></div>
  </div>
</div>

<script>
const API="https://mysmartslots-portal.onrender.com";
let currentU=null,currentP=null,currentName=null,isAdmin=false;
let currentModule=0,moduleStartTime=null;
let progress={};// {moduleIndex: {completed, score, timeSeconds, attempts}}

// ── MODULES ───────────────────────────────────────────────────────────────────
const MODULES=[
  {
    title:"What Is My Smart Slots?",
    emoji:"🤖",
    sub:"Product knowledge — what we sell, how it works, and why it matters.",
    readTime:"8 min",
    content:[
      {
        title:"The One-Line Pitch",
        body:`My Smart Slots is an AI-powered automation system for local service businesses. We handle missed call follow-up, booking confirmations, appointment reminders, review requests, and lead re-engagement — automatically, 24/7, without the business owner lifting a finger.

<div class="highlight"><strong>The simplest way to say it:</strong> "We make sure every customer who reaches out to your business gets a response — even when you're on a job, after hours, or on a weekend."</div>

That's it. If you can say that clearly and confidently, you can open a conversation with anyone.`
      },
      {
        title:"The 10 Automations We Sell",
        body:`Every plan includes some combination of these. Know them cold — customers will ask.

<ul>
<li><strong>Missed Call Text Back</strong> — When a call goes unanswered, the customer automatically gets a text with a booking link within seconds. This is our #1 closer.</li>
<li><strong>AI Chat Booking</strong> — A smart chatbot on their website answers questions and books appointments 24/7.</li>
<li><strong>SMS Confirmations</strong> — Every new booking triggers a confirmation text to the customer automatically.</li>
<li><strong>Appointment Reminders</strong> — Automated texts the day before and morning of every appointment. Eliminates most no-shows.</li>
<li><strong>Live SMS Chat</strong> — Customers can text the business number and get real-time AI responses.</li>
<li><strong>Post-Job Review Requests</strong> — After a completed job, an auto-text asks for a Google review at exactly the right moment.</li>
<li><strong>Lead Re-Engagement</strong> — Old cold leads get an automated follow-up sequence to bring them back.</li>
<li><strong>Partial Email Replies</strong> — Email inquiries get an instant auto-reply that captures info and moves toward booking.</li>
<li><strong>Calendar Sync</strong> — Bookings go directly to their Google, Outlook, or Calendly calendar.</li>
<li><strong>Monthly Report</strong> — Client gets a monthly recap of calls recovered, bookings confirmed, reviews requested, revenue impact.</li>
</ul>`
      },
      {
        title:"Our Three Plans",
        body:`<table class="plan-table">
<thead><tr><th>Plan</th><th>Monthly</th><th>Annual</th><th>Setup Fee</th><th>Best For</th></tr></thead>
<tbody>
<tr><td><strong>Starter</strong></td><td>$125/mo</td><td>$1,250/yr</td><td>$199</td><td>Solo / 1–2 employees</td></tr>
<tr><td><strong>Pro</strong></td><td>$225/mo</td><td>$2,250/yr</td><td>$199</td><td>3–6 employees</td></tr>
<tr><td><strong>Elite</strong></td><td>$375/mo</td><td>$3,750/yr</td><td>$199</td><td>7+ employees / multi-location</td></tr>
</tbody>
</table>

<div class="warning"><strong>Important:</strong> The $199 setup fee is collected first — before any monthly billing starts. Never quote just the monthly price without mentioning setup.</div>

Every plan has a <strong>30-day guarantee</strong> — no measurable improvement in 30 days, month two is free. No long-term contracts.`
      },
      {
        title:"Who We Sell To",
        body:`Any local service business that lives and dies by the phone. Our biggest verticals:

<ul>
<li>Plumbing, HVAC, Electrical, Roofing, General Contracting</li>
<li>Pest Control, Lawn & Landscaping, Auto Service</li>
<li>Hair Salons, Nail Techs, Med Spas, Massage & Wellness</li>
<li>Dental & Medical offices</li>
</ul>

The common thread: <strong>they book appointments, they get calls, and missed calls cost them real money.</strong> That's all you need.`
      }
    ],
    quiz:[
      {
        q:"What is the #1 automation that closes the most deals?",
        options:["Calendar Sync","Missed Call Text Back","Monthly Report","Lead Re-Engagement"],
        correct:1,
        explanation:"Missed Call Text Back is the single most compelling demo because the pain is immediate and universal — every service business misses calls."
      },
      {
        q:"A plumber with 4 employees asks about pricing. What plan do you recommend?",
        options:["Starter — $125/mo","Pro — $225/mo","Elite — $375/mo","Doesn't matter, let them pick"],
        correct:1,
        explanation:"Pro is the right fit for 3–6 employees. Match the plan to their size — this makes the recommendation feel personalized and knowledgeable."
      },
      {
        q:"A prospect asks 'what's the setup fee?' — what do you say?",
        options:["There's no setup fee","$199 one-time, collected before monthly billing starts","$199 per month","It depends on the plan"],
        correct:1,
        explanation:"Always be upfront about the $199 setup fee. Hiding it creates distrust. Frame it as: 'One-time fee, we have everything live within 24 hours of receiving it.'"
      },
      {
        q:"Which of these is NOT one of our 10 automations?",
        options:["Appointment Reminders","Social Media Posting","Post-Job Review Requests","Lead Re-Engagement"],
        correct:1,
        explanation:"We don't do social media posting. Know our exact 10 automations so you never overpromise."
      }
    ]
  },
  {
    title:"Who We Sell To & Why",
    emoji:"🎯",
    sub:"Ideal customer profile, fit scoring, and red flags to watch for.",
    readTime:"6 min",
    content:[
      {
        title:"The Perfect Prospect",
        body:`Before you pick up the phone, you should know whether this business is worth your time. The ideal My Smart Slots customer checks most of these boxes:

<div class="highlight">
<strong>✓ They rely on phone calls for new customers</strong><br/>
<strong>✓ They miss calls when they're with another customer or on a job</strong><br/>
<strong>✓ They don't have dedicated office staff to answer phones</strong><br/>
<strong>✓ They book appointments (not purely walk-in)</strong><br/>
<strong>✓ They're trying to grow or fill their schedule</strong><br/>
<strong>✓ They get 10+ inquiries per week</strong><br/>
<strong>✓ They can afford $125–$375/mo</strong>
</div>

You don't need all 7. But the more boxes they check, the easier the close.`
      },
      {
        title:"Red Flags — Know When to Walk Away",
        body:`Not every business is a good fit. These are signs to proceed carefully or skip entirely:

<ul>
<li><strong>Walk-in only</strong> — If they don't book appointments (like a convenience store), the automations don't make sense.</li>
<li><strong>Already has a full system</strong> — If they're on GoHighLevel or ServiceTitan and using it well, your pitch is harder. Ask what's missing, don't fight their existing setup.</li>
<li><strong>Too small</strong> — A solo operator doing 3–4 jobs a week may not generate enough call volume for this to pay off quickly.</li>
<li><strong>Resistant to technology</strong> — A prospect who says "I don't believe in all this AI stuff" requires extra work. Not impossible, but know your uphill battle.</li>
<li><strong>Commercial only</strong> — Commercial contractors often have purchasing departments and long sales cycles. Not our sweet spot.</li>
</ul>`
      },
      {
        title:"The Fit Score",
        body:`In the Prospector tool, every prospect gets a fit score 0–100% based on 10 qualifying questions. Use this as your guide:

<ul>
<li><strong>70%+ (Hot)</strong> — Move on this one. Lead with the audit, be direct.</li>
<li><strong>45–69% (Warm)</strong> — Worth pursuing. Offer the free audit and let the numbers do the work.</li>
<li><strong>Under 45% (Cold)</strong> — Proceed carefully. Don't over-invest follow-up time.</li>
</ul>

<div class="warning"><strong>Don't skip the fit check.</strong> Calling a cold prospect wastes your time and hurts your confidence. 10 minutes of research before a call is worth more than 10 cold calls to the wrong businesses.</div>`
      }
    ],
    quiz:[
      {
        q:"A nail salon with 3 chairs and a receptionist who answers phones — what's their fit level likely to be?",
        options:["Cold — they already have someone answering","Hot — appointment-based, multiple staff, phone-dependent","Warm — too small to matter","Can't determine without more info"],
        correct:1,
        explanation:"Nail salons are a strong fit. They're appointment-based, they get constant call volume, no-shows are common, and review volume directly drives new clients."
      },
      {
        q:"A prospect says 'we only do commercial contracts.' What do you do?",
        options:["Pitch them harder — commercial pays more","Ask what their current follow-up system looks like before deciding","Move on — not our sweet spot","Offer them a discount to close"],
        correct:1,
        explanation:"Always ask a question before deciding. Some commercial contractors also do residential work. But if it's purely commercial with long procurement cycles, it's not our best fit."
      },
      {
        q:"What fit score range means 'Hot — move on this one'?",
        options:["50% and above","60% and above","70% and above","80% and above"],
        correct:2,
        explanation:"70%+ is Hot. This means the business shows strong signals across multiple qualifying questions and the audit conversation should be straightforward."
      }
    ]
  },
  {
    title:"The Full Sales Process",
    emoji:"📋",
    sub:"Every step from first contact to client going live.",
    readTime:"10 min",
    content:[

// ── LOGIN ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  try{
    const r=await fetch(`${API}/portal/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(!r.ok){document.getElementById('login-error').style.display='block';return;}
    currentU=u.toLowerCase();currentP=p;currentName=d.name;isAdmin=d.isAdmin;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('rep-name-display').textContent=d.name;
    loadProgress();
    renderSidebar();
    if(isAdmin)document.getElementById('admin-nav-btn').style.display='block';
    loadModule(0);
    // Log training access
    fetch(`${API}/portal/setup/log`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:currentU,password:currentP,action:'training_access',client_name:'Training Portal'})}).catch(()=>{});
  }catch(e){document.getElementById('login-error').style.display='block';}
}

function doLogout(){
  currentU=null;currentP=null;progress={};
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('password').value='';
}

function toast(msg){
  const t=document.getElementById('toast-el');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── PROGRESS STORAGE ──────────────────────────────────────────────────────────
function loadProgress(){
  const saved=localStorage.getItem(`training_${currentU}`);
  progress=saved?JSON.parse(saved):{};
}

function saveProgress(){
  localStorage.setItem(`training_${currentU}`,JSON.stringify(progress));
  // Save to backend so admin can see it
  fetch(`${API}/portal/setup/log`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:currentU,password:currentP,
      action:'training_progress',
      client_name:JSON.stringify(progress)
    })
  }).catch(()=>{});
}

function getCompletedCount(){
  return MODULES.filter((_,i)=>progress[i]?.completed).length;
}

function getAvgScore(){
  const scores=MODULES.map((_,i)=>progress[i]?.score).filter(s=>s!==undefined);
  if(!scores.length)return null;
  return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar(){
  const nav=document.getElementById('module-nav');
  nav.innerHTML=MODULES.map((m,i)=>{
    const p=progress[i];
    const completed=p?.completed;
    const score=p?.score;
    const locked=i>0&&!progress[i-1]?.completed;
    let cls='module-item';
    if(i===currentModule)cls+=' active';
    if(completed)cls+=' completed';
    if(locked)cls+=' locked';
    return `<div class="${cls}" onclick="tryLoadModule(${i})">
      <div class="mod-num">${completed?'✓':i+1}</div>
      <div class="mod-info">
        <div class="mod-title">${m.emoji} ${m.title}</div>
        <div class="mod-status">${completed?`Completed`:`${m.readTime} read`}</div>
      </div>
      ${score!==undefined?`<div class="mod-score">${score}%</div>`:''}
    </div>`;
  }).join('');

  const total=MODULES.length;
  const done=getCompletedCount();
  const pct=Math.round((done/total)*100);
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
}

function tryLoadModule(i){
  if(i>0&&!progress[i-1]?.completed){
    toast('Complete the previous module first.');return;
  }
  loadModule(i);
}

// ── LOAD MODULE ───────────────────────────────────────────────────────────────
function loadModule(i){
  currentModule=i;
  moduleStartTime=Date.now();
  renderSidebar();

  const m=MODULES[i];
  const p=progress[i];
  const main=document.getElementById('main-content');
  document.getElementById('admin-panel')&&(document.getElementById('admin-panel').style.display='none');
  main.style.display='block';

  let html=`<div class="module-header">
    <div class="mod-eyebrow">Module ${i+1} of ${MODULES.length}</div>
    <div class="mod-h1">${m.emoji} ${m.title}</div>
    <div class="mod-sub">${m.sub}</div>
    <div class="mod-time"><div class="time-dot"></div>${m.readTime} read · ${m.quiz.length} quiz questions</div>
  </div>`;

  m.content.forEach(block=>{
    html+=`<div class="content-block">
      <div class="block-title">📖 ${block.title}</div>
      <div class="block-body">${block.body}</div>
    </div>`;
  });

  // Quiz
  const quizDone=p?.score!==undefined;
  html+=`<div class="quiz-section" id="quiz-section">
    <div class="quiz-title">✏️ Module Quiz</div>
    <div class="quiz-sub">Answer all questions to complete this module. You need 75% or higher to pass and unlock the next module.</div>
    ${m.quiz.map((q,qi)=>`
      <div class="quiz-q" id="qq-${qi}">
        <div class="quiz-q-text">${qi+1}. ${q.q}</div>
        <div class="quiz-options">
          ${q.options.map((opt,oi)=>`
            <label class="quiz-opt" id="qo-${qi}-${oi}">
              <input type="radio" name="q${qi}" value="${oi}" ${quizDone?'disabled':''}/> ${opt}
            </label>`).join('')}
        </div>
      </div>`).join('')}
    <button class="quiz-submit" id="quiz-submit-btn" onclick="submitQuiz(${i})" ${quizDone?'disabled':''}>
      ${quizDone?'Already submitted':'Submit Answers'}
    </button>
    <div class="quiz-result" id="quiz-result"></div>
    ${quizDone?`<button class="retry-btn" onclick="retryQuiz(${i})">↺ Retake Quiz</button>`:''}
  </div>`;

  if(p?.completed){
    html+=`<div class="complete-badge">✓ Module Complete — Score: ${p.score}%</div>`;
    if(i<MODULES.length-1){
      html+=`<button class="next-btn" id="next-btn" style="display:inline-block;" onclick="loadModule(${i+1})">Next Module: ${MODULES[i+1].title} →</button>`;
    } else {
      html+=`<div style="margin-top:1.5rem;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);border-radius:12px;padding:1.5rem;text-align:center;">
        <div style="font-size:28px;margin-bottom:.5rem;">🎉</div>
        <div style="font-size:18px;font-weight:800;color:var(--white);margin-bottom:.5rem;">Training Complete!</div>
        <div style="font-size:14px;color:var(--gray);">You've completed all 7 modules. Average score: ${getAvgScore()}%. Head to the Rep Portal to start working your pipeline.</div>
        <a href="/rep" style="display:inline-block;margin-top:1rem;background:var(--accent);color:var(--navy);padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;">Open Rep Portal →</a>
      </div>`;
    }
  } else {
    html+=`<button class="next-btn" id="next-btn" onclick="loadModule(${i+1})">Next Module →</button>`;
  }

  main.innerHTML=html;

  // If already done, show the correct/wrong answers
  if(quizDone&&p?.answers){
    restoreQuizAnswers(i,p.answers,p.score);
  }
}

// ── QUIZ LOGIC ────────────────────────────────────────────────────────────────
function submitQuiz(moduleIdx){
  const m=MODULES[moduleIdx];
  const answers=[];
  let correct=0;

  for(let qi=0;qi<m.quiz.length;qi++){
    const selected=document.querySelector(`input[name="q${qi}"]:checked`);
    if(!selected){toast('Please answer all questions first.');return;}
    const val=parseInt(selected.value);
    answers.push(val);
    if(val===m.quiz[qi].correct)correct++;
  }

  const score=Math.round((correct/m.quiz.length)*100);
  const passed=score>=75;
  const timeSpent=Math.round((Date.now()-moduleStartTime)/1000);

  // Record progress
  if(!progress[moduleIdx])progress[moduleIdx]={};
  progress[moduleIdx]={
    completed:passed,
    score,
    attempts:(progress[moduleIdx].attempts||0)+1,
    timeSeconds:(progress[moduleIdx].timeSeconds||0)+timeSpent,
    answers
  };
  saveProgress();
  renderSidebar();
  restoreQuizAnswers(moduleIdx,answers,score);

  const resultEl=document.getElementById('quiz-result');
  resultEl.style.display='block';
  if(passed){
    resultEl.className='quiz-result pass';
    resultEl.innerHTML=`✓ Passed — ${score}% (${correct}/${m.quiz.length} correct)<p>Module complete! ${moduleIdx<MODULES.length-1?'The next module is now unlocked.':'You\'ve completed all modules!'}</p>`;
    document.getElementById('quiz-submit-btn').disabled=true;
    document.getElementById('next-btn').style.display='inline-block';
    toast('🎉 Module passed!');
  } else {
    resultEl.className='quiz-result fail';
    resultEl.innerHTML=`✗ ${score}% — need 75% to pass (${correct}/${m.quiz.length} correct)<p>Review the content above and try again. No limit on retries.</p>`;
    // Add retry button
    const retryBtn=document.createElement('button');
    retryBtn.className='retry-btn';
    retryBtn.textContent='↺ Retake Quiz';
    retryBtn.onclick=()=>retryQuiz(moduleIdx);
    resultEl.after(retryBtn);
  }
}

function restoreQuizAnswers(moduleIdx,answers,score){
  const m=MODULES[moduleIdx];
  answers.forEach((val,qi)=>{
    const correctVal=m.quiz[qi].correct;
    const isCorrect=val===correctVal;
    const selectedOpt=document.getElementById(`qo-${qi}-${val}`);
    const correctOpt=document.getElementById(`qo-${qi}-${correctVal}`);
    if(selectedOpt)selectedOpt.classList.add(isCorrect?'correct':'wrong');
    if(!isCorrect&&correctOpt)correctOpt.classList.add('correct');
    document.querySelectorAll(`input[name="q${qi}"]`).forEach(r=>r.disabled=true);
  });
}

function retryQuiz(moduleIdx){
  // Reset quiz answers but keep attempt count
  if(progress[moduleIdx]){
    progress[moduleIdx].score=undefined;
    progress[moduleIdx].completed=false;
    progress[moduleIdx].answers=undefined;
    saveProgress();
  }
  loadModule(moduleIdx);
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
async function showAdminPanel(){
  const main=document.getElementById('main-content');
  main.style.display='none';

  let adminEl=document.getElementById('admin-panel');
  if(!adminEl){
    adminEl=document.createElement('div');
    adminEl.id='admin-panel';
    adminEl.style.cssText='padding:2rem 2.5rem 5rem;max-width:900px;';
    document.querySelector('.main').parentNode.appendChild(adminEl);
  }
  adminEl.style.display='block';

  adminEl.innerHTML=`<div class="admin-header">
    <h2>🔐 Training Progress — All Reps</h2>
    <p>Scores, time spent, and completion status per module per rep. Data updates each time a rep submits a quiz.</p>
  </div>
  <div id="admin-progress-body"><div class="empty">Loading rep progress...</div></div>`;

  // Fetch login data to find all reps who have accessed training
  try{
    const d=await fetch(`${API}/portal/admin/logins`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:currentU,password:currentP})});
    const data=await d.json();

    if(!data.success){adminEl.querySelector('#admin-progress-body').innerHTML='<div class="empty">Could not load data.</div>';return;}

    // Find reps who logged into training + their progress from setup logs
    const trainingLogins=data.logins.filter(l=>l.rep_name.includes('[setup]')&&l.rep_name.includes('training'));
    const repNames={};
    data.logins.filter(l=>!l.rep_name.includes('[')&&!l.rep_name.includes('Owner')).forEach(l=>{
      repNames[l.username]=l.rep_name;
    });

    // Get progress logs
    const progressLogs=data.logins.filter(l=>l.rep_name.includes('training_progress'));
    const repProgress={};
    progressLogs.forEach(l=>{
      try{
        const dataStr=l.rep_name.replace(/.*training_progress.*?: /,'');
        const match=l.rep_name.match(/\{.*\}/);
        if(match){
          repProgress[l.username]=JSON.parse(match[0]);
        }
      }catch(e){}
    });

    // Also pull from setup logs for training access
    const trainingReps=[...new Set(data.logins.filter(l=>l.rep_name.includes('[setup]: Training Portal')).map(l=>l.username))];

    if(!trainingReps.length){
      adminEl.querySelector('#admin-progress-body').innerHTML='<div class="empty">No reps have started training yet.</div>';
      return;
    }

    adminEl.querySelector('#admin-progress-body').innerHTML=trainingReps.map(rep=>{
      const prog=repProgress[rep]||{};
      const completed=MODULES.filter((_,i)=>prog[i]?.completed).length;
      const scores=MODULES.map((_,i)=>prog[i]?.score).filter(s=>s!==undefined);
      const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
      const totalTime=Object.values(prog).reduce((a,p)=>a+(p.timeSeconds||0),0);
      const timeStr=totalTime>3600?`${Math.floor(totalTime/3600)}h ${Math.floor((totalTime%3600)/60)}m`:totalTime>60?`${Math.floor(totalTime/60)}m ${totalTime%60}s`:`${totalTime}s`;
      const lastAccess=data.logins.find(l=>l.username===rep&&!l.rep_name.includes('['));

      return `<div class="rep-progress-card">
        <div class="rpc-header">
          <div>
            <div class="rpc-name">${repNames[rep]||rep}</div>
            <div style="font-size:12px;color:var(--gray);">Last active: ${lastAccess?new Date(lastAccess.logged_in_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—'}</div>
          </div>
          <div class="rpc-overall">${completed}/${MODULES.length} modules · ${avg!==null?avg+'% avg':' No scores yet'}</div>
        </div>
        <div class="rpc-modules">
          ${MODULES.map((m,i)=>{
            const mp=prog[i];
            const cls=mp?.completed?'done':mp?.score!==undefined?'failed':'';
            return `<div class="rpc-mod ${cls}">
              <div class="rpc-mod-num">Mod ${i+1}</div>
              <div class="rpc-mod-score">${mp?.score!==undefined?mp.score+'%':'—'}</div>
              <div class="rpc-mod-time">${mp?.timeSeconds?Math.round(mp.timeSeconds/60)+'min':''}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="rpc-stats">
          <span class="rpc-stat">⏱ Total time: <strong>${timeStr}</strong></span>
          <span class="rpc-stat">🔄 Total attempts: <strong>${Object.values(prog).reduce((a,p)=>a+(p.attempts||0),0)}</strong></span>
          <span class="rpc-stat">✅ Completed: <strong>${completed}/${MODULES.length}</strong></span>
          ${avg!==null?`<span class="rpc-stat">📊 Avg score: <strong>${avg}%</strong></span>`:''}
        </div>
      </div>`;
    }).join('');

  }catch(e){
    adminEl.querySelector('#admin-progress-body').innerHTML='<div class="empty">Error loading data — check console.</div>';
  }
}
</script>
